<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; img-src 'self' data:; font-src 'self' data:; connect-src *; base-uri 'self'; form-action 'self'; object-src 'none'">
<title>SriniKai</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%23c96442'/><text x='50' y='70' font-size='52' font-family='sans-serif' font-weight='bold' fill='white' text-anchor='middle'>SK</text></svg>">
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<style>
  :root {
    --bg: #f5f4ef; --panel: #ffffff; --panel-2: #faf9f5; --border: #e5e2d9;
    --text: #2b2a27; --muted: #7d7a70; --accent: #c96442; --accent-2: #e0926f;
    --accent-weak: #f4e7e1; --user-bubble: linear-gradient(135deg, #c96442, #d97757);
    --bot-bubble: #ffffff; --code-bg: #f3f1ea; --sidebar: #efece4;
    --shadow: 0 1px 3px rgba(0,0,0,.06), 0 10px 30px rgba(0,0,0,.06);
  }
  html[data-theme="dark"] {
    --bg: #1c1b18; --panel: #262522; --panel-2: #2b2a26; --border: #3a3631;
    --text: #ece9e2; --muted: #9b968a; --accent: #d97757; --accent-2: #e0926f;
    --accent-weak: #3a2c25; --user-bubble: linear-gradient(135deg, #d97757, #e08a5f);
    --bot-bubble: #2f2d29; --code-bg: #181715; --sidebar: #211f1c;
    --shadow: 0 1px 3px rgba(0,0,0,.3), 0 12px 34px rgba(0,0,0,.4);
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0; color: var(--text);
    background: radial-gradient(1100px 500px at 12% -8%, var(--accent-weak), transparent 60%), var(--bg);
    font: 16px/1.65 ui-sans-serif, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  .hidden { display: none !important; }
  button { font-family: inherit; }

  /* ============ AUTH ============ */
  #auth { position: fixed; inset: 0; z-index: 100; display: grid; place-items: center; padding: 20px;
    background: radial-gradient(1200px 600px at 20% -10%, var(--accent-weak), transparent 60%), var(--bg); }
  .auth-card { width: 100%; max-width: 380px; background: var(--panel); border: 1px solid var(--border);
    border-radius: 20px; box-shadow: var(--shadow); padding: 28px 26px; animation: rise .4s cubic-bezier(.2,.8,.2,1); }
  @keyframes rise { from { opacity: 0; transform: translateY(14px) scale(.98); } }
  .auth-logo { width: 56px; height: 56px; border-radius: 16px; display: grid; place-items: center; margin: 0 auto 14px;
    background: linear-gradient(135deg, var(--accent), var(--accent-2)); color: #fff; font-weight: 800; font-size: 20px;
    box-shadow: 0 6px 18px rgba(201,100,66,.35); }
  .auth-card h2 { text-align: center; margin: 0 0 4px; font-size: 21px; }
  .auth-card .sub { text-align: center; color: var(--muted); font-size: 13px; margin: 0 0 20px; }
  .tabs { display: flex; background: var(--panel-2); border: 1px solid var(--border); border-radius: 12px; padding: 4px; margin-bottom: 18px; }
  .tabs button { flex: 1; border: none; background: transparent; color: var(--muted); padding: 8px; border-radius: 9px;
    font: inherit; font-size: 14px; font-weight: 600; cursor: pointer; transition: .15s; }
  .tabs button.active { background: var(--panel); color: var(--text); box-shadow: var(--shadow); }
  .auth-field { margin-bottom: 14px; }
  .auth-field label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 6px; font-weight: 600; }
  .auth-field input { width: 100%; background: var(--panel-2); color: var(--text); border: 1px solid var(--border);
    border-radius: 11px; padding: 11px 13px; font: inherit; font-size: 15px; transition: border-color .15s; }
  .auth-field input:focus { outline: none; border-color: var(--accent); }
  .auth-field input.bad { border-color: #d9534f; }
  .auth-submit { width: 100%; border: none; border-radius: 12px; padding: 12px; cursor: pointer;
    background: linear-gradient(135deg, var(--accent), var(--accent-2)); color: #fff; font: inherit; font-size: 15px;
    font-weight: 700; margin-top: 4px; transition: opacity .15s, transform .05s; }
  .auth-submit:hover { opacity: .93; } .auth-submit:active { transform: translateY(1px); }
  .auth-msg { min-height: 18px; text-align: center; font-size: 13px; margin-top: 12px; }
  .auth-msg.err { color: #d9534f; } .auth-msg.ok { color: #5fae6e; }
  .auth-note { text-align: center; font-size: 11px; color: var(--muted); margin-top: 16px; line-height: 1.5; }

  /* ============ LAYOUT ============ */
  .layout { display: flex; height: 100vh; }
  .scrim { position: fixed; inset: 0; background: rgba(0,0,0,.35); z-index: 39; display: none; }
  .scrim.show { display: block; }

  /* Sidebar */
  .sidebar { width: 264px; flex: 0 0 264px; background: var(--sidebar); border-right: 1px solid var(--border);
    display: flex; flex-direction: column; transition: margin-left .22s ease; }
  .sidebar.collapsed { margin-left: -264px; }
  .sb-top { padding: 14px 12px 8px; }
  .new-chat { width: 100%; display: flex; align-items: center; gap: 8px; justify-content: center;
    background: linear-gradient(135deg, var(--accent), var(--accent-2)); color: #fff; border: none;
    border-radius: 11px; padding: 11px; font-size: 14px; font-weight: 600; cursor: pointer; transition: opacity .15s; }
  .new-chat:hover { opacity: .92; }
  .sb-label { padding: 10px 16px 6px; font-size: 11px; font-weight: 700; letter-spacing: .5px; text-transform: uppercase; color: var(--muted); }
  .sb-list { flex: 1; overflow-y: auto; padding: 0 8px 8px; }
  .chat-item { display: flex; align-items: center; gap: 6px; padding: 9px 10px; border-radius: 10px;
    cursor: pointer; color: var(--text); font-size: 14px; transition: background .12s; }
  .chat-item:hover { background: var(--panel-2); }
  .chat-item.active { background: var(--accent-weak); }
  .ci-title { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .ci-del { opacity: 0; border: none; background: transparent; color: var(--muted); cursor: pointer;
    font-size: 15px; padding: 0 4px; border-radius: 6px; flex: 0 0 auto; }
  .chat-item:hover .ci-del { opacity: 1; }
  .ci-del:hover { color: #d9534f; }
  .sb-empty { padding: 14px 16px; color: var(--muted); font-size: 13px; }
  .sb-foot { border-top: 1px solid var(--border); padding: 10px 12px; display: flex; align-items: center; gap: 8px; }
  .who-chip { display: flex; align-items: center; gap: 8px; flex: 1; min-width: 0; font-size: 13px; }
  .who-chip .pic { width: 28px; height: 28px; border-radius: 50%; display: grid; place-items: center; flex: 0 0 auto;
    background: linear-gradient(135deg, var(--accent), var(--accent-2)); color: #fff; font-weight: 700; font-size: 12px; }
  .who-chip .nm { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  /* Main column */
  .main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  header { display: flex; align-items: center; gap: 10px; padding: 12px 18px; border-bottom: 1px solid var(--border);
    background: var(--panel); }
  .brand { display: flex; align-items: center; gap: 10px; font-weight: 600; }
  .logo { width: 30px; height: 30px; border-radius: 9px; display: grid; place-items: center;
    background: linear-gradient(135deg, var(--accent), var(--accent-2)); color: #fff; font-weight: 800; font-size: 13px; }
  .brand .name { font-size: 16px; }
  .model-chip { font-size: 12px; color: var(--muted); border: 1px solid var(--border); border-radius: 999px;
    padding: 2px 10px; max-width: 220px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .spacer { flex: 1; }
  .icon-btn { width: 36px; height: 36px; border-radius: 9px; border: 1px solid transparent; background: transparent;
    color: var(--muted); cursor: pointer; display: grid; place-items: center; font-size: 16px; transition: .15s; }
  .icon-btn:hover { background: var(--panel-2); color: var(--text); border-color: var(--border); }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); margin: 0 4px; }
  .status-dot.ok { background: #5fae6e; box-shadow: 0 0 0 3px rgba(95,174,110,.18); }
  .status-dot.err { background: #d9534f; box-shadow: 0 0 0 3px rgba(217,83,79,.18); }

  .settings { position: absolute; right: 16px; top: 60px; width: 300px; background: var(--panel);
    border: 1px solid var(--border); border-radius: 14px; box-shadow: var(--shadow); padding: 16px; z-index: 30; display: none; }
  .settings.open { display: block; }
  .settings h3 { margin: 0 0 12px; font-size: 12px; color: var(--muted); font-weight: 700; text-transform: uppercase; letter-spacing: .6px; }
  .field { margin-bottom: 13px; }
  .field label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 5px; }
  .field input[type=text], .field input[type=number] { width: 100%; background: var(--panel-2); color: var(--text);
    border: 1px solid var(--border); border-radius: 9px; padding: 9px 11px; font: inherit; font-size: 14px; }
  .field .row { display: flex; align-items: center; gap: 10px; }
  .field .row input[type=range] { flex: 1; accent-color: var(--accent); }
  .field .val { font-variant-numeric: tabular-nums; font-size: 13px; width: 34px; text-align: right; }

  /* Chat scroll */
  #chat { flex: 1; overflow-y: auto; scroll-behavior: smooth; position: relative; }
  .col { max-width: 820px; margin: 0 auto; padding: 26px 20px 8px; }
  .welcome { text-align: center; padding: 9vh 20px; }
  .welcome .logo { width: 60px; height: 60px; border-radius: 18px; font-size: 24px; margin: 0 auto 18px; }
  .welcome h2 { font-size: 27px; margin: 0 0 6px; font-weight: 600; }
  .welcome p { color: var(--muted); margin: 0 0 26px; }
  .suggest { display: grid; grid-template-columns: 1fr 1fr; gap: 11px; max-width: 560px; margin: 0 auto; }
  .suggest button { text-align: left; background: var(--panel); border: 1px solid var(--border); border-radius: 14px;
    padding: 13px 15px; cursor: pointer; color: var(--text); font: inherit; font-size: 14px; transition: .15s; }
  .suggest button:hover { border-color: var(--accent); transform: translateY(-1px); }
  .suggest button .t { font-weight: 600; display: block; }
  .suggest button .d { color: var(--muted); font-size: 12px; }

  .turn { display: flex; gap: 10px; margin-bottom: 16px; align-items: flex-end; }
  .turn.user { flex-direction: row-reverse; }
  .av { width: 30px; height: 30px; border-radius: 50%; display: grid; place-items: center; font-size: 11px;
    font-weight: 800; flex: 0 0 auto; margin-bottom: 2px; }
  .turn.assistant .av { background: linear-gradient(135deg, var(--accent), var(--accent-2)); color: #fff; }
  .turn.user .av { background: var(--accent-weak); color: var(--accent); }
  .stack { max-width: 82%; display: flex; flex-direction: column; }
  .turn.user .stack { align-items: flex-end; }
  .bubble { padding: 11px 15px; border-radius: 18px; box-shadow: var(--shadow); animation: pop .18s ease-out; }
  @keyframes pop { from { opacity: 0; transform: translateY(6px); } }
  .turn.assistant .bubble { background: var(--bot-bubble); border: 1px solid var(--border); border-bottom-left-radius: 6px; }
  .turn.user .bubble { background: var(--user-bubble); color: #fff; border-bottom-right-radius: 6px; }
  .turn.user .bubble a { color: #fff; text-decoration: underline; }
  .turn.user .bubble :not(pre) > code { background: rgba(255,255,255,.2); color: #fff; }
  .actions { display: flex; gap: 4px; margin: 5px 2px 0; opacity: 0; transition: opacity .15s; }
  .turn:hover .actions { opacity: 1; }
  .act { border: none; background: transparent; color: var(--muted); font-size: 12px; cursor: pointer;
    padding: 3px 8px; border-radius: 7px; transition: .12s; }
  .act:hover { background: var(--panel-2); color: var(--text); }

  .prose { word-wrap: break-word; overflow-wrap: anywhere; }
  .prose > *:first-child { margin-top: 0; } .prose > *:last-child { margin-bottom: 0; }
  .prose p { margin: 0 0 10px; }
  .prose h1,.prose h2,.prose h3 { line-height: 1.3; margin: 16px 0 8px; }
  .prose h1 { font-size: 1.35em; } .prose h2 { font-size: 1.2em; } .prose h3 { font-size: 1.08em; }
  .prose ul,.prose ol { margin: 0 0 10px; padding-left: 22px; } .prose li { margin: 3px 0; }
  .prose a { color: var(--accent); }
  .prose blockquote { margin: 0 0 10px; padding: 2px 14px; border-left: 3px solid var(--border); color: var(--muted); }
  .prose :not(pre) > code { background: var(--code-bg); padding: 1px 5px; border-radius: 5px;
    font: 13.5px/1.5 ui-monospace, "SF Mono", Menlo, Consolas, monospace; }
  .prose table { border-collapse: collapse; margin: 0 0 10px; font-size: 14px; }
  .prose th, .prose td { border: 1px solid var(--border); padding: 6px 10px; }
  .prose pre { margin: 0 0 10px; }
  .codeblock { border: 1px solid var(--border); border-radius: 12px; overflow: hidden; background: var(--code-bg); margin: 6px 0 12px; }
  .codeblock .cb-head { display: flex; align-items: center; justify-content: space-between; padding: 6px 8px 6px 12px;
    background: var(--panel-2); border-bottom: 1px solid var(--border); font-size: 11px; color: var(--muted); }
  .cb-head .dots { display: flex; gap: 5px; margin-right: auto; }
  .cb-head .dots i { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
  .cb-head .dots i:nth-child(1){ background:#ef6a5f; } .cb-head .dots i:nth-child(2){ background:#f5bd4f; } .cb-head .dots i:nth-child(3){ background:#61c554; }
  .cb-head .lang { text-transform: lowercase; letter-spacing: .3px; }
  .cb-copy { background: transparent; border: 1px solid var(--border); color: var(--muted); border-radius: 7px;
    padding: 3px 9px; font-size: 11px; cursor: pointer; transition: .15s; }
  .cb-copy:hover { color: var(--text); border-color: var(--accent); }
  .codeblock pre { margin: 0; padding: 13px 14px; overflow-x: auto; }
  .codeblock code { font: 13.5px/1.6 ui-monospace, "SF Mono", Menlo, Consolas, monospace; background: none !important; padding: 0 !important; }
  .cursor { display: inline-block; width: 8px; height: 1.05em; background: currentColor; border-radius: 2px;
    vertical-align: text-bottom; animation: blink 1s steps(2) infinite; opacity: .7; }
  @keyframes blink { 50% { opacity: 0; } }

  .scroll-btn { position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%) scale(.9);
    width: 38px; height: 38px; border-radius: 50%; border: 1px solid var(--border); background: var(--panel);
    color: var(--text); box-shadow: var(--shadow); cursor: pointer; display: none; place-items: center; font-size: 16px; }
  .scroll-btn.show { display: grid; }

  footer { padding: 8px 20px 18px; background: linear-gradient(transparent, var(--bg) 35%); }
  .composer { max-width: 820px; margin: 0 auto; background: var(--panel); border: 1px solid var(--border);
    border-radius: 18px; box-shadow: var(--shadow); padding: 8px 8px 8px 16px; display: flex; align-items: flex-end; gap: 8px; transition: border-color .15s; }
  .composer:focus-within { border-color: var(--accent); }
  textarea { flex: 1; resize: none; background: transparent; color: var(--text); border: none; outline: none;
    font: inherit; padding: 9px 0; max-height: 220px; min-height: 26px; line-height: 1.5; }
  .send { width: 40px; height: 40px; border-radius: 12px; border: none; cursor: pointer; flex: 0 0 auto;
    background: linear-gradient(135deg, var(--accent), var(--accent-2)); color: #fff; display: grid; place-items: center;
    font-size: 17px; transition: opacity .15s, transform .05s; }
  .send:hover { opacity: .92; } .send:active { transform: scale(.94); }
  .send:disabled { background: var(--border); color: var(--muted); cursor: default; }
  .send.stop { background: var(--text); }
  .foot-hint { max-width: 820px; margin: 8px auto 0; text-align: center; color: var(--muted); font-size: 11.5px; }

  @media (max-width: 760px) {
    .sidebar { position: fixed; z-index: 40; height: 100%; box-shadow: var(--shadow); }
    .model-chip { display: none; }
  }
</style>
</head>
<body>

  <!-- ============ LOGIN ============ -->
  <div id="auth">
    <div class="auth-card">
      <div class="auth-logo">SK</div>
      <h2 id="authTitle">Welcome back</h2>
      <p class="sub">Sign in to continue to SriniKai</p>
      <div class="tabs">
        <button id="tabSignin" class="active">Sign in</button>
        <button id="tabSignup">Create account</button>
      </div>
      <form id="authForm" autocomplete="off">
        <div class="auth-field" id="nameField" style="display:none">
          <label>Name</label><input type="text" id="auName" placeholder="Your name">
        </div>
        <div class="auth-field"><label>Email</label>
          <input type="email" id="auEmail" placeholder="you@example.com" autocomplete="username"></div>
        <div class="auth-field"><label>Password</label>
          <input type="password" id="auPass" placeholder="At least 4 characters" autocomplete="current-password"></div>
        <button type="submit" class="auth-submit" id="authSubmit">Sign in</button>
        <div class="auth-msg" id="authMsg"></div>
      </form>
      <div class="auth-note">Accounts are stored only in this browser (localStorage).<br>This is a local demo gate, not real security.</div>
    </div>
  </div>

  <!-- ============ APP ============ -->
  <div class="layout hidden" id="layout">
    <div class="scrim" id="scrim"></div>
    <aside class="sidebar" id="sidebar">
      <div class="sb-top"><button class="new-chat" id="newChatBtn">&#43; New chat</button></div>
      <div class="sb-label">Conversations</div>
      <div class="sb-list" id="chatList"></div>
      <div class="sb-foot">
        <div class="who-chip"><span class="pic" id="whoPic">?</span><span class="nm" id="whoName">you</span></div>
        <button class="icon-btn" id="logoutBtn" title="Log out">&#10138;</button>
      </div>
    </aside>

    <div class="main">
      <header>
        <button class="icon-btn" id="menuBtn" title="Toggle sidebar">&#9776;</button>
        <div class="brand"><div class="logo">SK</div><span class="name">SriniKai</span></div>
        <span class="model-chip" id="modelChip">local model</span>
        <span class="spacer"></span>
        <span class="status-dot" id="dot" title="connection"></span>
        <button class="icon-btn" id="themeBtn" title="Toggle theme">&#9680;</button>
        <button class="icon-btn" id="gearBtn" title="Settings">&#9881;</button>
      </header>

      <div class="settings" id="settings">
        <h3>Settings</h3>
        <div class="field"><label>Server URL</label><input type="text" id="server" placeholder="same site (leave blank) or http://localhost:8080"></div>
        <div class="field"><label>Temperature</label>
          <div class="row"><input type="range" id="temp" min="0" max="2" step="0.1" value="0.7"><span class="val" id="tempVal">0.7</span></div></div>
        <div class="field"><label>System prompt</label><input type="text" id="system" placeholder="You are SriniKai, a helpful assistant."></div>
        <div class="field"><label>API key (optional)</label><input type="password" id="apikey" placeholder="sent as Bearer token if set"></div>
      </div>

      <div id="chat">
        <div class="col" id="messages"></div>
        <button class="scroll-btn" id="scrollBtn" title="Scroll to bottom">&darr;</button>
      </div>

      <footer>
        <div class="composer">
          <textarea id="input" rows="1" placeholder="Message SriniKai&hellip;"></textarea>
          <button class="send" id="send" title="Send">&uarr;</button>
        </div>
        <div class="foot-hint">SriniKai can make mistakes. Responses are generated locally.</div>
      </footer>
    </div>
  </div>

<script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js" integrity="sha384-/TQbtLCAerC3jgaim+N78RZSDYV7ryeoBCVqTuzRrFec2akfBkHS7ACQ3PQhvMVi" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.7/dist/purify.min.js" integrity="sha384-XQqX/4yiUGu+oyr87jvWzRuqBUK/adrY0DunhL+tID9m/9dwSpV8h9Fk/Sg6ifVQ" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@highlightjs/cdn-assets@11.10.0/highlight.min.js" integrity="sha384-GdEWAbCjn+ghjX0gLx7/N1hyTVmPAjdC2OvoAA0RyNcAOhqwtT8qnbCxWle2+uJX" crossorigin="anonymous"></script>
<link rel="stylesheet" id="hljs-theme" href="https://cdn.jsdelivr.net/npm/@highlightjs/cdn-assets@11.10.0/styles/atom-one-light.min.css">
<script>
const $ = s => document.querySelector(s);

/* ===================== AUTH (local only) ===================== */
const USERS_KEY = 'sk-users', SESSION_KEY = 'sk-session';
const loadUsers = () => JSON.parse(localStorage.getItem(USERS_KEY) || '{}');
const saveUsers = u => localStorage.setItem(USERS_KEY, JSON.stringify(u));
const normEmail = e => e.trim().toLowerCase();
let currentUser = null;

async function sha256(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return [...new Uint8Array(buf)].map(b => b.toString(16).padStart(2, '0')).join('');
}

let authMode = 'signin';
const authMsg = (t, c) => { const m = $('#authMsg'); m.textContent = t; m.className = 'auth-msg ' + (c || ''); };
const markBad = (el, bad) => el.classList.toggle('bad', !!bad);

function setAuthMode(mode) {
  authMode = mode; const up = mode === 'signup';
  $('#tabSignin').classList.toggle('active', !up);
  $('#tabSignup').classList.toggle('active', up);
  $('#nameField').style.display = up ? 'block' : 'none';
  $('#authTitle').textContent = up ? 'Create your account' : 'Welcome back';
  $('.sub').textContent = up ? 'Set up a local SriniKai account' : 'Sign in to continue to SriniKai';
  $('#authSubmit').textContent = up ? 'Create account' : 'Sign in';
  authMsg('', ''); markBad($('#auEmail'), false); markBad($('#auPass'), false);
}
$('#tabSignin').onclick = () => setAuthMode('signin');
$('#tabSignup').onclick = () => setAuthMode('signup');

$('#auEmail').addEventListener('blur', () => {
  const email = normEmail($('#auEmail').value); if (!email) return;
  const exists = !!loadUsers()[email];
  if (authMode === 'signup' && exists) authMsg('That email is already registered - try signing in.', 'err');
  else if (authMode === 'signin' && !exists && email.includes('@')) authMsg('No account found for this email yet.', 'err');
  else authMsg('', '');
});

$('#authForm').addEventListener('submit', async e => {
  e.preventDefault();
  const email = normEmail($('#auEmail').value), pass = $('#auPass').value, users = loadUsers();
  markBad($('#auEmail'), false); markBad($('#auPass'), false);
  if (!email.includes('@')) { authMsg('Please enter a valid email.', 'err'); markBad($('#auEmail'), true); return; }
  if (pass.length < 4) { authMsg('Password must be at least 4 characters.', 'err'); markBad($('#auPass'), true); return; }
  if (authMode === 'signup') {
    if (users[email]) { authMsg('That email is already registered - try signing in.', 'err'); markBad($('#auEmail'), true); return; }
    users[email] = { name: $('#auName').value.trim() || email.split('@')[0], hash: await sha256(pass) };
    saveUsers(users); authMsg('Account created. Signing you in...', 'ok');
    setTimeout(() => enterApp(email), 500); return;
  }
  const user = users[email];
  if (!user) { authMsg('No account found for this email. Create one instead.', 'err'); markBad($('#auEmail'), true); return; }
  if (user.hash !== await sha256(pass)) { authMsg('Incorrect password. Please try again.', 'err'); markBad($('#auPass'), true); return; }
  enterApp(email);
});

function enterApp(email) {
  localStorage.setItem(SESSION_KEY, email);
  currentUser = email;
  const user = loadUsers()[email] || { name: email.split('@')[0] };
  $('#whoName').textContent = user.name;
  $('#whoPic').textContent = (user.name[0] || '?').toUpperCase();
  $('#auth').classList.add('hidden');
  $('#layout').classList.remove('hidden');
  loadChatsForUser();
  checkHealth(); getModel(); inputEl.focus();
}

function logout() {
  localStorage.removeItem(SESSION_KEY);
  currentUser = null; chats = []; activeId = null; history = []; messagesEl.innerHTML = '';
  $('#layout').classList.add('hidden'); $('#settings').classList.remove('open');
  $('#auth').classList.remove('hidden'); $('#auPass').value = ''; setAuthMode('signin'); $('#auEmail').focus();
}

/* ===================== CONVERSATIONS ===================== */
let chats = [];          // [{id, title, messages, updated}]
let activeId = null;
const chatsKey = () => 'sk-chats:' + currentUser;
const saveChats = () => localStorage.setItem(chatsKey(), JSON.stringify(chats));
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 6);

function loadChatsForUser() {
  chats = JSON.parse(localStorage.getItem(chatsKey()) || '[]');
  if (chats.length) openChat(chats[0].id); else newChat();
}

function newChat() {
  const c = { id: uid(), title: 'New chat', messages: [], updated: Date.now() };
  chats.unshift(c); activeId = c.id; history = c.messages; saveChats();
  renderSidebar(); welcome(); closeSidebarMobile(); inputEl.focus();
}

function openChat(id) {
  const c = chats.find(x => x.id === id); if (!c) return;
  activeId = id; history = c.messages;
  renderSidebar(); renderConversation(); closeSidebarMobile();
}

function deleteChat(id, ev) {
  ev?.stopPropagation();
  chats = chats.filter(c => c.id !== id); saveChats();
  if (activeId === id) { if (chats.length) openChat(chats[0].id); else newChat(); }
  else renderSidebar();
}

function activeChat() { return chats.find(c => c.id === activeId); }
function touchChat() {
  const c = activeChat(); if (!c) return;
  c.updated = Date.now();
  if (c.title === 'New chat') {
    const first = c.messages.find(m => m.role === 'user');
    if (first) c.title = first.content.replace(/\s+/g, ' ').trim().slice(0, 40);
  }
  saveChats(); renderSidebar();
}

function renderSidebar() {
  const list = $('#chatList');
  if (!chats.length) { list.innerHTML = '<div class="sb-empty">No conversations yet.</div>'; return; }
  list.innerHTML = '';
  chats.forEach(c => {
    const item = document.createElement('div');
    item.className = 'chat-item' + (c.id === activeId ? ' active' : '');
    item.onclick = () => openChat(c.id);
    const title = document.createElement('span'); title.className = 'ci-title'; title.textContent = c.title || 'New chat';
    const del = document.createElement('button'); del.className = 'ci-del'; del.innerHTML = '&times;'; del.title = 'Delete';
    del.onclick = e => deleteChat(c.id, e);
    item.append(title, del); list.append(item);
  });
}

/* ===================== CHAT RENDER ===================== */
const messagesEl = $('#messages'), chatEl = $('#chat'), inputEl = $('#input');
const dot = $('#dot'), sendBtn = $('#send');
let history = [];
let streaming = false, abortCtl = null;

const hasMD = () => typeof marked !== 'undefined' && typeof DOMPurify !== 'undefined';
if (hasMD()) {
  marked.setOptions({ breaks: true, gfm: true });
  DOMPurify.addHook('afterSanitizeAttributes', n => {
    if (n.tagName === 'A') { n.setAttribute('target', '_blank'); n.setAttribute('rel', 'noopener noreferrer'); }
  });
}

function apiKey() { return $('#apikey').value.trim(); }
function authHeaders(base) {
  const h = base ? { ...base } : {};
  const k = apiKey(); if (k) h['Authorization'] = 'Bearer ' + k;
  return h;
}

function serverUrl() {
  const v = $('#server').value.trim().replace(/\/+$/, '');
  if (v) return v;
  // blank = talk to wherever this page was served from (works for tunnels/sharing).
  // when opened via the python dev server on :5173, fall back to the local llama-server.
  return location.port === '5173' ? 'http://localhost:8080' : location.origin;
}
function setDot(c, t) { dot.className = 'status-dot ' + (c || ''); dot.title = t || ''; }
function atBottom() { return chatEl.scrollHeight - chatEl.scrollTop - chatEl.clientHeight < 80; }
function scrollDown(force) { if (force || atBottom()) chatEl.scrollTop = chatEl.scrollHeight; }
function renderMarkdown(t) { return hasMD() ? DOMPurify.sanitize(marked.parse(t)) : escapeHtml(t); }
function escapeHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function decorateCode(container) {
  container.querySelectorAll('pre > code').forEach(code => {
    const pre = code.parentElement; if (pre.dataset.done) return; pre.dataset.done = '1';
    const lang = (code.className.match(/language-(\w+)/) || [])[1] || 'code';
    if (typeof hljs !== 'undefined') { try { hljs.highlightElement(code); } catch (_) {} }
    const wrap = document.createElement('div'); wrap.className = 'codeblock';
    const head = document.createElement('div'); head.className = 'cb-head';
    head.innerHTML = `<span class="dots"><i></i><i></i><i></i></span><span class="lang">${lang}</span>`;
    const btn = document.createElement('button'); btn.className = 'cb-copy'; btn.textContent = 'Copy';
    btn.onclick = () => { navigator.clipboard.writeText(code.textContent); btn.textContent = 'Copied'; setTimeout(() => btn.textContent = 'Copy', 1200); };
    head.appendChild(btn); pre.replaceWith(wrap); wrap.append(head, pre);
  });
}

function welcome() {
  messagesEl.innerHTML = `
    <div class="welcome">
      <div class="logo">SK</div>
      <h2>How can I help, today?</h2>
      <p>I'm SriniKai - running privately on your machine.</p>
      <div class="suggest">
        <button data-q="Explain how transformers work in simple terms."><span class="t">Explain a concept</span><span class="d">how transformers work</span></button>
        <button data-q="Write a Python function to merge two sorted lists."><span class="t">Write code</span><span class="d">merge two sorted lists</span></button>
        <button data-q="Give me 5 creative names for a coffee shop."><span class="t">Brainstorm</span><span class="d">coffee shop names</span></button>
        <button data-q="Summarize the pros and cons of remote work."><span class="t">Summarize</span><span class="d">pros and cons of remote work</span></button>
      </div>
    </div>`;
  messagesEl.querySelectorAll('.suggest button').forEach(b => b.onclick = () => { inputEl.value = b.dataset.q; send(); });
}

function makeTurn(role, content) {
  const turn = document.createElement('div'); turn.className = 'turn ' + role;
  const av = document.createElement('div'); av.className = 'av';
  av.textContent = role === 'user' ? ($('#whoPic').textContent || 'Y') : 'SK';
  const stack = document.createElement('div'); stack.className = 'stack';
  const bubble = document.createElement('div'); bubble.className = 'bubble';
  const prose = document.createElement('div'); prose.className = 'prose';
  bubble.append(prose); stack.append(bubble);
  if (role === 'assistant') {
    const actions = document.createElement('div'); actions.className = 'actions';
    const copy = document.createElement('button'); copy.className = 'act'; copy.textContent = 'Copy';
    copy.onclick = () => { navigator.clipboard.writeText(content ?? prose.dataset.raw ?? prose.textContent);
      copy.textContent = 'Copied'; setTimeout(() => copy.textContent = 'Copy', 1200); };
    const regen = document.createElement('button'); regen.className = 'act'; regen.textContent = 'Regenerate';
    regen.onclick = () => regenerate();
    actions.append(copy, regen); stack.append(actions);
  }
  turn.append(av, stack); messagesEl.append(turn);
  if (content != null) { prose.dataset.raw = content; prose.innerHTML = renderMarkdown(content); decorateCode(prose); }
  return prose;
}

function renderConversation() {
  messagesEl.innerHTML = '';
  if (!history.length) { welcome(); return; }
  history.forEach(m => makeTurn(m.role, m.content));
  scrollDown(true);
}

async function checkHealth() {
  try { const r = await fetch(serverUrl() + '/health', { headers: authHeaders() }); r.ok ? setDot('ok', 'connected') : setDot('err', 'server error ' + r.status); }
  catch (_) { setDot('err', 'no server at ' + serverUrl()); }
}
async function getModel() {
  try {
    const r = await fetch(serverUrl() + '/v1/models', { headers: authHeaders() }); if (!r.ok) return;
    const id = (await r.json()).data?.[0]?.id;
    if (id) $('#modelChip').textContent = id.split(/[\\/]/).pop();
  } catch (_) {}
}

function setSending(on) {
  streaming = on; sendBtn.classList.toggle('stop', on);
  sendBtn.innerHTML = on ? '&#9632;' : '&uarr;'; sendBtn.title = on ? 'Stop' : 'Send';
}

async function runCompletion() {
  const out = makeTurn('assistant');
  out.innerHTML = '<span class="cursor"></span>';
  let acc = ''; setSending(true);
  const msgs = []; const sys = $('#system').value.trim();
  if (sys) msgs.push({ role: 'system', content: sys });
  msgs.push(...history);
  abortCtl = new AbortController();
  try {
    const res = await fetch(serverUrl() + '/v1/chat/completions', {
      method: 'POST', headers: authHeaders({ 'Content-Type': 'application/json' }), signal: abortCtl.signal,
      body: JSON.stringify({ model: 'SriniKai', messages: msgs, temperature: parseFloat($('#temp').value) || 0.7, stream: true })
    });
    if (!res.ok) throw new Error('HTTP ' + res.status + ': ' + await res.text());
    const reader = res.body.getReader(), decoder = new TextDecoder(); let buf = '';
    while (true) {
      const { done, value } = await reader.read(); if (done) break;
      buf += decoder.decode(value, { stream: true });
      const lines = buf.split('\n'); buf = lines.pop();
      for (const line of lines) {
        const t = line.trim(); if (!t.startsWith('data:')) continue;
        const data = t.slice(5).trim(); if (data === '[DONE]') continue;
        try { const delta = JSON.parse(data).choices?.[0]?.delta?.content;
          if (delta) { acc += delta; out.innerHTML = renderMarkdown(acc) + '<span class="cursor"></span>'; scrollDown(); } } catch (_) {}
      }
    }
    history.push({ role: 'assistant', content: acc });
    out.dataset.raw = acc; out.innerHTML = renderMarkdown(acc); decorateCode(out);
    setDot('ok', 'connected'); touchChat();
  } catch (e) {
    if (e.name === 'AbortError') {
      history.push({ role: 'assistant', content: acc });
      out.dataset.raw = acc; out.innerHTML = renderMarkdown(acc || '_(stopped)_'); decorateCode(out); touchChat();
    } else { out.innerHTML = renderMarkdown(acc) + `\n\n> &#9888; ${escapeHtml(e.message)}`; setDot('err', 'request failed'); }
  } finally { setSending(false); abortCtl = null; inputEl.focus(); }
}

async function send() {
  if (streaming) { abortCtl?.abort(); return; }
  const text = inputEl.value.trim(); if (!text) return;
  inputEl.value = ''; inputEl.style.height = 'auto';
  if (messagesEl.querySelector('.welcome')) messagesEl.innerHTML = '';
  history.push({ role: 'user', content: text });
  makeTurn('user', text); scrollDown(true); touchChat();
  await runCompletion();
}

async function regenerate() {
  if (streaming) return;
  if (history.length && history[history.length - 1].role === 'assistant') history.pop();
  const turns = messagesEl.querySelectorAll('.turn.assistant');
  if (turns.length) turns[turns.length - 1].remove();
  saveChats();
  await runCompletion();
}

/* ===================== WIRING ===================== */
sendBtn.onclick = send;
$('#newChatBtn').onclick = () => { if (streaming) abortCtl?.abort(); newChat(); };
$('#logoutBtn').onclick = logout;
$('#gearBtn').onclick = () => $('#settings').classList.toggle('open');
$('#tempVal').textContent = $('#temp').value;
$('#temp').oninput = e => $('#tempVal').textContent = e.target.value;

const SETTINGS_KEY = 'sk-settings';
function loadSettings() {
  const s = JSON.parse(localStorage.getItem(SETTINGS_KEY) || '{}');
  if (s.server != null) $('#server').value = s.server;
  if (s.temp != null) { $('#temp').value = s.temp; $('#tempVal').textContent = s.temp; }
  if (s.system != null) $('#system').value = s.system;
  if (s.apikey != null) $('#apikey').value = s.apikey;
}
function saveSettings() {
  localStorage.setItem(SETTINGS_KEY, JSON.stringify({
    server: $('#server').value, temp: $('#temp').value, system: $('#system').value, apikey: $('#apikey').value
  }));
}
['#server', '#temp', '#system', '#apikey'].forEach(id => {
  const el = $(id); el.addEventListener('input', saveSettings); el.addEventListener('change', saveSettings);
});

function isMobile() { return window.matchMedia('(max-width: 760px)').matches; }
function closeSidebarMobile() { if (isMobile()) { $('#sidebar').classList.add('collapsed'); $('#scrim').classList.remove('show'); } }
$('#menuBtn').onclick = () => {
  const sb = $('#sidebar'); sb.classList.toggle('collapsed');
  $('#scrim').classList.toggle('show', isMobile() && !sb.classList.contains('collapsed'));
};
$('#scrim').onclick = closeSidebarMobile;

const setTheme = t => {
  document.documentElement.dataset.theme = t;
  $('#hljs-theme').href = `https://cdn.jsdelivr.net/npm/@highlightjs/cdn-assets@11.10.0/styles/atom-one-${t === 'dark' ? 'dark' : 'light'}.min.css`;
  localStorage.setItem('sk-theme', t);
};
$('#themeBtn').onclick = () => setTheme(document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark');
setTheme(localStorage.getItem('sk-theme') || 'light');

inputEl.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } });
inputEl.addEventListener('input', () => { inputEl.style.height = 'auto'; inputEl.style.height = Math.min(inputEl.scrollHeight, 220) + 'px'; });
$('#server').addEventListener('change', () => { checkHealth(); getModel(); });
chatEl.addEventListener('scroll', () => $('#scrollBtn').classList.toggle('show', !atBottom()));
$('#scrollBtn').onclick = () => scrollDown(true);
document.addEventListener('click', e => {
  if (!$('#settings').contains(e.target) && e.target !== $('#gearBtn')) $('#settings').classList.remove('open');
});
setInterval(() => { if (!$('#layout').classList.contains('hidden')) checkHealth(); }, 5000);

/* ===================== BOOT ===================== */
(function boot() {
  loadSettings();
  const session = localStorage.getItem(SESSION_KEY);
  if (session && loadUsers()[session]) enterApp(session);
  else { setAuthMode('signin'); $('#auEmail').focus(); }
})();
</script>
</body>
</html>
